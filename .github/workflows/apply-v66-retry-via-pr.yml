name: Retry v66 patch through PR

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v66-retry-via-pr.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  patch-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Reuse and execute the validated v66 patch block
        shell: python
        run: |
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-v66-ai-support-balance.yml').read_text(encoding='utf-8')
          marker = "      - name: Patch game balance, AI and compact UI\n        shell: python\n        run: |\n"
          start = workflow.find(marker)
          if start < 0:
              raise SystemExit('v66 patch block was not found')
          start += len(marker)
          end_marker = "\n      - name: Syntax checks"
          end = workflow.find(end_marker, start)
          if end < 0:
              raise SystemExit('v66 patch block end was not found')
          block = workflow[start:end]
          block = textwrap.dedent(block)
          exec(compile(block, 'embedded-v66-patch.py', 'exec'), {'__name__': '__main__'})

      - name: Verify generated changes
        run: |
          node --check js/game.js
          python -m json.tool v66-validation-summary.json >/dev/null
          grep -q 'const GAME_VERSION = 66;' js/game.js

      - name: Commit and push patch branch
        run: |
          branch='v66-ai-support-balance'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B "$branch"
          git add js/game.js index.html README.md v66-validation-summary.json
          git diff --cached --quiet && exit 0
          git commit -m 'Balance support units and improve specialist AI for v66'
          git push --force-with-lease origin "HEAD:$branch"

      - name: Open or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view v66-ai-support-balance --json url >/dev/null 2>&1 || \
            gh pr create \
              --base main \
              --head v66-ai-support-balance \
              --title 'v66: support balance and specialist AI improvements' \
              --body 'Applies the v66 support-unit, sniper, trapper, lead-bailout, shared-trigger, and compact-UI changes. Direct push to main was replaced with a reviewable PR branch.'
