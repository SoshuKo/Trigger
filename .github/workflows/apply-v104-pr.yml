name: Apply v104 release from PR

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply-release:
    if: github.head_ref == 'release-v104-performance-role-ai-docs'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reconstruct, diagnose, apply and validate
        shell: bash
        run: |
          set -u
          if [ ! -f .github/v104-release-patch/part-00 ]; then
            echo 'Transfer payload already removed; nothing to do.'
            exit 0
          fi

          EXPECT_B64='b6e866c5d3cf86b026b645192c249bb766878a559ea75ed1331cbb49e6ec63cb'
          EXPECT_GZ='c1e9620caaa57d4aa561a0eb1450a0abb7f92578cff4694f36243bab3dc4f4bd'
          EXPECT_PATCH='af9d0e8fedd8c95b41cc2897f1bd2f725bbef295e921a38512022f653c774a66'
          DIAG=.github/v104-diagnostic.txt
          : > "$DIAG"

          cat .github/v104-release-patch/part-* > /tmp/v104-release.patch.gz.b64
          ACTUAL_B64=$(sha256sum /tmp/v104-release.patch.gz.b64 | awk '{print $1}')
          echo "base64_expected=$EXPECT_B64" >> "$DIAG"
          echo "base64_actual=$ACTUAL_B64" >> "$DIAG"
          echo "base64_bytes=$(wc -c < /tmp/v104-release.patch.gz.b64)" >> "$DIAG"

          DECODE_OK=1
          base64 --decode /tmp/v104-release.patch.gz.b64 > /tmp/v104-release.patch.gz 2>/tmp/v104-base64.err || DECODE_OK=0
          echo "decode_ok=$DECODE_OK" >> "$DIAG"
          cat /tmp/v104-base64.err >> "$DIAG"

          ACTUAL_GZ='unavailable'
          ACTUAL_PATCH='unavailable'
          GZIP_OK=0
          APPLY_OK=0
          if [ "$DECODE_OK" = 1 ]; then
            ACTUAL_GZ=$(sha256sum /tmp/v104-release.patch.gz | awk '{print $1}')
            echo "gzip_expected=$EXPECT_GZ" >> "$DIAG"
            echo "gzip_actual=$ACTUAL_GZ" >> "$DIAG"
            gzip -dc /tmp/v104-release.patch.gz > /tmp/v104-release.patch 2>/tmp/v104-gzip.err && GZIP_OK=1
            echo "gzip_ok=$GZIP_OK" >> "$DIAG"
            cat /tmp/v104-gzip.err >> "$DIAG"
          fi
          if [ "$GZIP_OK" = 1 ]; then
            ACTUAL_PATCH=$(sha256sum /tmp/v104-release.patch | awk '{print $1}')
            echo "patch_expected=$EXPECT_PATCH" >> "$DIAG"
            echo "patch_actual=$ACTUAL_PATCH" >> "$DIAG"
            git apply --check /tmp/v104-release.patch > /tmp/v104-apply.out 2>/tmp/v104-apply.err && APPLY_OK=1
            echo "apply_ok=$APPLY_OK" >> "$DIAG"
            cat /tmp/v104-apply.out /tmp/v104-apply.err >> "$DIAG"
          fi

          if [ "$ACTUAL_B64" != "$EXPECT_B64" ] || [ "$ACTUAL_GZ" != "$EXPECT_GZ" ] || [ "$ACTUAL_PATCH" != "$EXPECT_PATCH" ] || [ "$APPLY_OK" != 1 ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add "$DIAG"
            git diff --cached --quiet || git commit -m 'Record v104 transfer diagnostics'
            git push origin HEAD:${{ github.head_ref }}
            exit 1
          fi

          rm -f "$DIAG"
          git apply --index /tmp/v104-release.patch

          set -euo pipefail
          node --check js/game.js
          node --check js/i18n.js
          node --check js/v77-features.js
          node --check simulation/common.mjs
          node --check simulation/matrix.mjs
          node --check simulation/merge-results.mjs
          node --check simulation/run-batch.mjs
          grep -q 'GAME_VERSION = 104' js/game.js
          grep -q 'VERSION 104' index.html
          grep -q '"version": "104.0.0"' package.json
          grep -q 'VERSION 104' README.md
          test -f '攻略本.md'
          test -f V104_PERFORMANCE_SNIPER_ATTACKER_NAMED_BALANCE.txt
          test -f simulation-results/v104-calibration-summary.json
          ! grep -q 'VERSION 103' index.html

          rm -rf .github/v104-release-patch
          rm -f .github/v104-archive-url.txt
          rm -f .github/workflows/apply-v104-release.yml
          rm -f .github/v104-diagnostic.txt
          git add -A

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Release v104 performance and role AI balance update'
          git push origin HEAD:${{ github.head_ref }}
