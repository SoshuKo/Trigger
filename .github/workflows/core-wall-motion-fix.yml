name: Core Wall Motion Fix

on:
  push:
    branches: [main]
    paths:
      - '.github/core-wall-motion-fix.py'
      - '.github/workflows/core-wall-motion-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch core wall motion
        run: python .github/core-wall-motion-fix.py
      - name: Validate JavaScript and collision invariants
        run: |
          node --check js/game.js
          node --check js/v77-features.js
          node --check js/i18n.js
          grep -F 'movePlayerWithWallSlide(p, dt)' js/game.js
          grep -F 'const GAME_VERSION = 103;' js/game.js
          ! grep -F 'recoverEmbeddedPlayer(g,p' js/v77-features.js
          ! grep -F 'embeddedWallContact(g,p' js/v77-features.js
          grep -F 'VERSION 103' index.html
          grep -F '?v=103' index.html
          node <<'NODE'
          const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
          function move(p,walls,dt,world={w:400,h:300}){
            const radius=Math.max(4,p.radius-.2),startX=p.x,startY=p.y;
            let nextX=clamp(startX+p.vx*dt,radius,world.w-radius),blockedX=false;
            if(nextX>startX+.0001){for(const wall of walls){if(startY+radius<=wall.y+.01||startY-radius>=wall.y+wall.h-.01)continue;if(startX+radius<=wall.x+.05&&nextX+radius>wall.x){nextX=Math.min(nextX,wall.x-radius-.01);blockedX=true;}}}
            else if(nextX<startX-.0001){for(const wall of walls){if(startY+radius<=wall.y+.01||startY-radius>=wall.y+wall.h-.01)continue;const edge=wall.x+wall.w;if(startX-radius>=edge-.05&&nextX-radius<edge){nextX=Math.max(nextX,edge+radius+.01);blockedX=true;}}}
            p.x=nextX;if(blockedX)p.vx=0;
            let nextY=clamp(startY+p.vy*dt,radius,world.h-radius),blockedY=false;
            if(nextY>startY+.0001){for(const wall of walls){if(p.x+radius<=wall.x+.01||p.x-radius>=wall.x+wall.w-.01)continue;if(startY+radius<=wall.y+.05&&nextY+radius>wall.y){nextY=Math.min(nextY,wall.y-radius-.01);blockedY=true;}}}
            else if(nextY<startY-.0001){for(const wall of walls){if(p.x+radius<=wall.x+.01||p.x-radius>=wall.x+wall.w-.01)continue;const edge=wall.y+wall.h;if(startY-radius>=edge-.05&&nextY-radius<edge){nextY=Math.max(nextY,edge+radius+.01);blockedY=true;}}}
            p.y=nextY;if(blockedY)p.vy=0;
          }
          const wall={x:80,y:100,w:160,h:20};
          const crossing={x:140,y:150,vx:0,vy:-500,radius:18};move(crossing,[wall],.1);
          if(crossing.y<137.79)throw new Error(`crossed thin wall: ${crossing.y}`);
          const sliding={x:100,y:138.01,vx:100,vy:-120,radius:18};move(sliding,[wall],.1);
          if(sliding.x<109.9||sliding.y<137.79)throw new Error(`wall slide failed: ${JSON.stringify(sliding)}`);
          const laneWalls=[{x:80,y:0,w:20,h:300},{x:136,y:0,w:20,h:300}];
          const lane={x:118,y:180,vx:0,vy:-100,radius:18};move(lane,laneWalls,.2);
          if(Math.abs(lane.x-118)>.01||lane.y>160.01)throw new Error(`narrow lane blocked: ${JSON.stringify(lane)}`);
          console.log('wall collision invariants passed');
          NODE
      - name: Commit validated fix
        run: |
          rm -f .github/core-wall-motion-fix.py .github/workflows/core-wall-motion-fix.yml
          git config user.name 'SoshuKo'
          git config user.email '178671009+SoshuKo@users.noreply.github.com'
          git add js/game.js js/v77-features.js js/i18n.js index.html .github/core-wall-motion-fix.py .github/workflows/core-wall-motion-fix.yml
          git commit -m 'Release v103 swept wall collision fix'
          git push origin HEAD:main
