name: Apply v66 support and specialist AI patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v66-ai-support-balance.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Patch game balance, AI and compact UI
        shell: python
        run: |
          from pathlib import Path
          import json

          path = Path('js/game.js')
          text = path.read_text(encoding='utf-8')

          def replace(old, new, count=None):
              global text
              found = text.count(old)
              if found == 0:
                  raise SystemExit(f'patch target missing: {old[:120]}')
              if count is not None and found != count:
                  raise SystemExit(f'unexpected target count {found} != {count}: {old[:120]}')
              text = text.replace(old, new)

          # Version and compact symbolic HUD labels.
          replace('const GAME_VERSION = 65;', 'const GAME_VERSION = 66;', 1)
          replace("const MAP_LABELS = { city: '市街', desert: '砂漠', snowShrine: '雪山神殿', underground: '地下通路' };", "const MAP_LABELS = { city: '▦', desert: '◌', snowShrine: '❄', underground: '▤' };", 1)
          replace("const MODE_LABELS = { solo: '個人戦', team: 'チーム戦', defense: '防衛戦', extra: 'エキストラ' };", "const MODE_LABELS = { solo: '◇', team: '◆', defense: '▣', extra: '✦' };", 1)
          replace("const TIME_LABELS = { morning: '朝', day: '昼', night: '夜' };", "const TIME_LABELS = { morning: '◐', day: '☀', night: '☾' };", 1)
          replace("const WEATHER_LABELS = { clear: '晴', cloudy: '曇り', rain: '雨' };", "const WEATHER_LABELS = { clear: '○', cloudy: '☁', rain: '☂' };", 1)
          replace("const DEFENSE_SCENARIO_LABELS = { blackTrigger: 'ブラックトリガー', hyakki: '百鬼夜行' };", "const DEFENSE_SCENARIO_LABELS = { blackTrigger: '★', hyakki: '☯' };", 1)

          # Base strength. Summoned helpers receive a separate operator-support multiplier below.
          replace("sogetsu: { label:'双月', category:'防衛助っ人', hp:286, speed:182, radius:18, damage:34, support:true },", "sogetsu: { label:'双月', category:'防衛助っ人', hp:330, speed:196, radius:18, damage:41, support:true },", 1)
          replace("fullarms: { label:'全武装', category:'防衛助っ人', hp:336, speed:158, radius:19, damage:33, support:true },", "fullarms: { label:'全武装', category:'防衛助っ人', hp:395, speed:168, radius:19, damage:40, support:true },", 1)
          replace("geist: { label:'ガイスト', category:'防衛助っ人', hp:286, speed:174, radius:18, damage:32, support:true },", "geist: { label:'ガイスト', category:'防衛助っ人', hp:334, speed:188, radius:18, damage:39, support:true },", 1)

          # Geist lasts longer and leaks trion more slowly.
          replace('player.geistMaxTimer = 25;', 'player.geistMaxTimer = 38;', 1)
          replace("p.geistActive=true;p.geistTimer=p.geistMaxTimer||25;p.geistBaseSpeed=p.speed;p.speed*=1.32;", "p.geistActive=true;p.geistTimer=p.geistMaxTimer||38;p.geistBaseSpeed=p.speed;p.speed*=1.42;", 1)
          replace("const gm=p.geistActive?1.42:1;", "const gm=p.geistActive?1.62:1;", 1)
          replace("p.trion=Math.max(0,p.trion-dt*1.15);", "p.trion=Math.max(0,p.trion-dt*(p.summonedByOperator?.42:.62));", 1)
          replace("cd=99;cost=15;", "cd=99;cost=10;", 1)

          # Stronger signature attacks.
          replace("damage*1.05,4,'#e8fbff'", "damage*1.22,4,'#e8fbff'", 1)
          replace("damage:damage*.28", "damage:damage*.34")
          replace("damage:damage*.32", "damage:damage*.39")
          replace("for(let i=0;i<18;i++)", "for(let i=0;i<24;i++)", 1)
          replace("damage:damage*(i%5===0?.38:.16)", "damage:damage*(i%5===0?.48:.21)", 1)
          replace("damage:damage*.95", "damage:damage*1.18", 1)
          replace("cd=7.5;cost=32;", "cd=6.2;cost=27;", 1)
          replace("sogetsu:{main:[3,7,.12,12],sub:[3,9,.12,1]}", "sogetsu:{main:[2.5,6,.12,9],sub:[2.5,7.5,.12,1]}", 1)
          replace("fullarms:{main:[5,8,.12,7],sub:[6,7,5,32]}", "fullarms:{main:[4,6.5,.12,6],sub:[5,5.5,4,27]}", 1)
          replace("geist:{main:[4,5,6,.12],sub:[8,18,10,1]}", "geist:{main:[3,4,5,.12],sub:[6,10,8,1]}", 1)

          # Operator-summoned helpers: explicit reinforced state and stronger shared combat fundamentals.
          old = "support.summonedByOperator=true;\n       support.respawnTimer=Infinity;"
          new = "support.summonedByOperator=true;\n       support.supportBuff={damage:1.22,defense:.78,trionCost:.72,cooldown:.86};\n       support.maxHp=Math.round(support.maxHp*1.18);support.hp=support.maxHp;\n       support.maxTrion=Math.round(support.maxTrion*1.22);support.trion=support.maxTrion;\n       support.defenseAI.damage*=1.22;support.geistMaxTimer=type==='geist'?44:support.geistMaxTimer;\n       support.respawnTimer=Infinity;"
          replace(old, new, 1)

          # Common trigger identity: standard source keys/names are used for metrics, hit handling and shared animations.
          replace("sourceName:'全武装・突撃銃',sourceKey:'asteroid'", "sourceName:'アステロイド（突撃銃）',sourceKey:'assaultAsteroid'", 1)
          replace("sourceName:'全武装・ハウンド',sourceKey:'hound'", "sourceName:'ハウンド（突撃銃）',sourceKey:'assaultHound'", 1)
          replace("sourceName:'ガイスト・アステロイド突撃銃',sourceKey:'asteroid'", "sourceName:'アステロイド（突撃銃）',sourceKey:'assaultAsteroid'", 1)
          replace("sourceName:'ガイスト・バイパー突撃銃',sourceKey:'viper'", "sourceName:'バイパー（突撃銃）',sourceKey:'assaultViper'", 1)
          replace("used=melee(p.geistActive?'ガイスト・強化弧月':'弧月'", "used=melee(p.geistActive?'弧月・ガイスト強化':'弧月'", 1)

          # Snipers hold a true rear firing line and are never assigned as flag guards.
          replace("preferred: min + (max - min) * (p.archetype === '狙撃手' ? .48 : .46)", "preferred: min + (max - min) * (p.archetype === '狙撃手' ? .74 : .46)", 1)
          replace("const desired = band?.preferred || 330;", "const desired = p.archetype === '狙撃手' ? Math.max(760, band?.preferred || 760) : (band?.preferred || 330);", 1)
          replace("unit.operatorOrder={type:'focus',targetId:enemy.id,label:'狙撃・独立射線'};", "unit.operatorOrder={type:'hold',x:clamp(enemy.x+Math.cos(towardHome)*820+Math.cos(towardHome+side)*180,60,this.world.w-60),y:clamp(enemy.y+Math.sin(towardHome)*820+Math.sin(towardHome+side)*180,60,this.world.h-60),label:'⌖'};", 1)
          replace("unit.operatorOrder={type:'hold',x:clamp(enemy.x+Math.cos(a)*720,60,this.world.w-60),y:clamp(enemy.y+Math.sin(a)*720,60,this.world.h-60),label:'後方から脅威排除'};", "unit.operatorOrder={type:'hold',x:clamp(enemy.x+Math.cos(a)*860,60,this.world.w-60),y:clamp(enemy.y+Math.sin(a)*860,60,this.world.h-60),label:'⌖'};", 1)

          # Earlier voluntary bailout when immobilised by lead bullets.
          old = "const hpRatio = p.hp / Math.max(1, p.maxHp);\n       const threshold = roleThresholds[p.archetype] || .14;\n       if (hpRatio > threshold) return false;"
          new = "const hpRatio = p.hp / Math.max(1, p.maxHp);\n       const leadRatio=clamp((p.leadWeights||0)/8,0,1);\n       const leadCritical=(p.leadWeights||0)>=4;\n       const threshold = Math.max(roleThresholds[p.archetype] || .14, leadCritical ? (.34 + leadRatio*.18) : 0);\n       if (hpRatio > threshold && !leadCritical) return false;"
          replace(old, new, 1)
          replace("if (contactAge < 4.2 || threatened || nearestEnemy < (critical ? 260 : 380)) return false;", "if (!leadCritical && (contactAge < 4.2 || threatened || nearestEnemy < (critical ? 260 : 380))) return false;\n       if (leadCritical && nearestEnemy < 170 && threatened) return false;", 1)
          replace("const chance = critical ? .9 : clamp(.16 + severity * .52 + lowTrion + difficultyBonus, .08, .78);", "const chance = leadCritical ? clamp(.68+leadRatio*.28,0,0.96) : critical ? .9 : clamp(.16 + severity * .52 + lowTrion + difficultyBonus, .08, .78);", 1)

          # Trappers stay concealed longer and predict high-traffic movement paths farther ahead.
          replace("const combatClose = Number.isFinite(distanceToTarget) && distanceToTarget < (p.toggles.chameleon ? 220 : 470);", "const combatClose = Number.isFinite(distanceToTarget) && distanceToTarget < (p.toggles.chameleon ? 220 : (p.archetype==='工作手'?290:470));", 1)
          replace("const durationLimit = p.toggles.chameleon ? 8.5 : 12;", "const durationLimit = p.toggles.chameleon ? (p.archetype==='工作手'?13:8.5) : (p.archetype==='工作手'?22:12);", 1)
          replace("if (id === 'switchbox') score = p.archetype === '工作手' ? 8 : 2;", "if (id === 'switchbox') score = p.archetype === '工作手' ? (distanceToTarget>360?12:8.5) : 2;", 1)
          replace("p.ai.placePoint = { x: target.x + (target.vx || 0) * .55, y: target.y + (target.vy || 0) * .55 };", "const lead=p.archetype==='工作手'?1.45:.55;const lane=this.getAIEngagementPoint(p,target,this.getAIRangeBand(p),0);p.ai.placePoint={x:clamp(target.x+(target.vx||0)*lead+(lane?lane.x-target.x:0)*.22,55,this.world.w-55),y:clamp(target.y+(target.vy||0)*lead+(lane?lane.y-target.y:0)*.22,55,this.world.h-55)};", 1)

          # Apply summoned helper buff centrally to damage intake and trion spending where those values are finalised.
          replace("const effectiveDamage = Math.max(0, damageAfterShield);", "const effectiveDamage = Math.max(0, damageAfterShield) * (target.supportBuff?.defense || 1);", 1)

          path.write_text(text, encoding='utf-8')

          # Keep cache-busting and permanent documentation aligned.
          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          html = html.replace('game.js?v=65', 'game.js?v=66').replace('styles.css?v=65', 'styles.css?v=66')
          index.write_text(html, encoding='utf-8')

          readme = Path('README.md')
          if readme.exists():
              r = readme.read_text(encoding='utf-8')
              r = r.replace('対応バージョン:** 65', '対応バージョン:** 66').replace('対応バージョン:** 64', '対応バージョン:** 66')
              readme.write_text(r, encoding='utf-8')

          validation = {
              'version': 66,
              'changes': {
                  'geist': {'maxSeconds': 38, 'summonedMaxSeconds': 44, 'drainPerSecond': .62, 'summonedDrainPerSecond': .42, 'activationCost': 10},
                  'supportSummonBuff': {'damage': 1.22, 'damageTaken': .78, 'trionCost': .72, 'cooldown': .86, 'hp': 1.18, 'trion': 1.22},
                  'sniper': 'rear-line hold, no flag guard assignment, preferred range >=760px',
                  'leadBailout': 'starts considering bailout at 4 lead weights and high HP',
                  'trapper': 'longer concealment and predicted traffic-lane trap placement',
                  'ui': 'map, mode, time, weather and defense scenario labels converted to symbols'
              }
          }
          Path('v66-validation-summary.json').write_text(json.dumps(validation, ensure_ascii=False, indent=2)+'\n', encoding='utf-8')

      - name: Syntax checks
        run: |
          node --check js/game.js
          python -m json.tool v66-validation-summary.json >/dev/null

      - name: Commit v66 patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/game.js index.html README.md v66-validation-summary.json
          git diff --cached --quiet && exit 0
          git commit -m "Balance support units and improve specialist AI for v66"
          git push origin HEAD:main
