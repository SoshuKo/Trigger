name: Root Wall Recovery Hotfix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/root-wall-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch root movement code
        run: python .github/root-wall-fix.py

      - name: Validate JavaScript
        run: |
          node --check js/v77-features.js
          node --check js/online-config.js
          node --check js/trigger-data.js
          ! grep -F "open=openPointNear(g,p.x,p.y" js/v77-features.js
          ! grep -F "prototype.update" js/online-config.js
          grep -F "damage: 58, speed: 1280" js/trigger-data.js
          grep -F "damage: 33, speed: 1750" js/trigger-data.js
          grep -F "damage: 84, speed: 820" js/trigger-data.js

      - name: Commit root fix
        run: |
          rm -f .github/workflows/root-wall-fix.yml .github/root-wall-fix.py
          git config user.name "SoshuKo"
          git config user.email "178671009+SoshuKo@users.noreply.github.com"
          git add js/v77-features.js js/online-config.js js/trigger-data.js .github/workflows/root-wall-fix.yml .github/root-wall-fix.py
          git commit -m "Fix root wall recovery and remove heavy wall hotfix"
          git push origin HEAD:main
