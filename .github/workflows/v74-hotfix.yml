name: Apply v74 cube and version hotfix

on:
  push:
    paths:
      - '.github/workflows/v74-hotfix.yml'

permissions:
  contents: write

jobs:
  apply-hotfix:
    if: github.event.head_commit.message == 'Run v74 cube and version hotfix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Patch v74 files
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          text = text.replace('styles.css?v=73', 'styles.css?v=74')
          text = text.replace('VERSION 73', 'VERSION 74')
          text = text.replace('js/game.js?v=73', 'js/game.js?v=74')
          hotfix_link = '  <link rel="stylesheet" href="v74-hotfix.css?v=74" />\n'
          if 'v74-hotfix.css' not in text:
              text = text.replace('</head>', hotfix_link + '</head>')
          index.write_text(text, encoding='utf-8')

          game = Path('js/game.js')
          text = game.read_text(encoding='utf-8')
          text = text.replace('const GAME_VERSION = 73;', 'const GAME_VERSION = 74;')
          game.write_text(text, encoding='utf-8')
          PY
      - name: Validate
        run: |
          node --check js/game.js
          grep -q 'VERSION 74' index.html
          grep -q 'const GAME_VERSION = 74;' js/game.js
          grep -q 'v74-hotfix.css?v=74' index.html
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html js/game.js v74-hotfix.css
          git commit -m 'Apply v74 version and cube display fix'
          git push origin main
