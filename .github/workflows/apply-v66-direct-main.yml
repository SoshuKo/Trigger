name: Apply v66 directly to main

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v66-direct-main.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-v66-direct-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run the verified v66 patch body
        shell: python
        run: |
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-v66-ai-support-balance.yml').read_text(encoding='utf-8')
          marker = '      - name: Patch game balance, AI and compact UI\n        shell: python\n        run: |\n'
          start = source.index(marker) + len(marker)
          end = source.index('\n      - name: Syntax checks', start)
          block = source[start:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          exec(compile(script, 'v66-inline-patch.py', 'exec'), {})

      - name: Validate patched game
        run: |
          node --check js/game.js
          python -m json.tool v66-validation-summary.json >/dev/null

      - name: Commit and push v66 to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/game.js index.html README.md v66-validation-summary.json
          git diff --cached --quiet && exit 0
          git commit -m "Balance support units and improve specialist AI for v66"
          git pull --rebase origin main
          git push origin HEAD:main
