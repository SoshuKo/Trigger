<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TRION LINK // OBS Comment Overlay</title>
  <style>
    :root {
      --cyan: #65e8ff;
      --cyan-bright: #b9f7ff;
      --cyan-deep: #19b9df;
      --blue: #2d7fff;
      --text: #eafaff;
      --muted: #8eb1c1;
      --panel: rgba(5, 21, 31, .90);
      --panel-soft: rgba(9, 31, 44, .84);
      --line: rgba(101, 232, 255, .24);
      --accent: #65e8ff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: Inter, "Noto Sans JP", "Yu Gothic", sans-serif;
    }

    body {
      display: flex;
      justify-content: flex-end;
      padding: 24px;
    }

    .overlay {
      position: relative;
      width: min(432px, 100%);
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      filter: drop-shadow(0 18px 30px rgba(0, 0, 0, .28));
    }

    .overlay::before {
      content: "";
      position: absolute;
      inset: 96px 0 0;
      z-index: -1;
      pointer-events: none;
      opacity: .38;
      background:
        linear-gradient(rgba(101, 232, 255, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(101, 232, 255, .045) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, transparent, #000 14%, #000 88%, transparent);
    }

    .header {
      position: relative;
      width: 76px;
      min-height: 76px;
      display: grid;
      grid-template-columns: 76px;
      align-items: center;
      padding: 5px;
      overflow: visible;
      border: 0;
      background: transparent;
      clip-path: none;
    }

    .header::after {
      display: none;
    }

    .cube-stage {
      width: 66px;
      height: 66px;
      display: grid;
      place-items: center;
      perspective: 260px;
      border: 1px solid rgba(101, 232, 255, .13);
      background: radial-gradient(circle, rgba(101, 232, 255, .14), transparent 66%);
    }

    .cube {
      position: relative;
      width: 34px;
      height: 34px;
      transform-style: preserve-3d;
      animation: cube-spin 8s linear infinite;
    }

    .cube-face {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(185, 247, 255, .92);
      background:
        linear-gradient(45deg, transparent 47%, rgba(255,255,255,.28) 49%, rgba(255,255,255,.28) 51%, transparent 53%),
        linear-gradient(-45deg, transparent 47%, rgba(255,255,255,.18) 49%, rgba(255,255,255,.18) 51%, transparent 53%),
        rgba(25, 185, 223, .28);
      box-shadow: inset 0 0 12px rgba(101, 232, 255, .22);
      backface-visibility: visible;
    }

    .cube-face.front  { transform: translateZ(17px); }
    .cube-face.back   { transform: rotateY(180deg) translateZ(17px); }
    .cube-face.right  { transform: rotateY(90deg) translateZ(17px); }
    .cube-face.left   { transform: rotateY(-90deg) translateZ(17px); }
    .cube-face.top    { transform: rotateX(90deg) translateZ(17px); }
    .cube-face.bottom { transform: rotateX(-90deg) translateZ(17px); }

    @keyframes cube-spin {
      from { transform: rotateX(-18deg) rotateY(0deg) rotateZ(0deg); }
      to   { transform: rotateX(342deg) rotateY(360deg) rotateZ(180deg); }
    }

    .heading-copy { min-width: 0; }
    .heading-copy,
    .signal,
    .footer,
    .division,
    .time,
    .empty {
      display: none !important;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--cyan);
      font: 800 9px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: .22em;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1;
      letter-spacing: .04em;
    }

    .heading-copy small {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font: 700 8px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: .1em;
    }

    .signal {
      align-self: start;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
      color: #8fffd0;
      font: 800 8px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: .12em;
    }

    .signal i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #63e6a2;
      box-shadow: 0 0 9px rgba(99, 230, 162, .8);
      animation: signal-pulse 1.8s ease-in-out infinite;
    }

    @keyframes signal-pulse {
      50% { opacity: .34; transform: scale(.72); }
    }

    .feed {
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 9px;
      padding: 4px 0;
      overflow: hidden;
    }

    .comment {
      --comment-accent: var(--accent);
      position: relative;
      padding: 11px 13px 12px 16px;
      overflow: hidden;
      border: 1px solid rgba(101, 232, 255, .16);
      border-left: 3px solid var(--comment-accent);
      background:
        linear-gradient(110deg, var(--panel), rgba(5, 21, 31, .72)),
        var(--panel);
      clip-path: polygon(0 0, calc(100% - 11px) 0, 100% 11px, 100% 100%, 0 100%);
      animation: comment-in .34s cubic-bezier(.16, .72, .24, 1) both;
    }

    .comment::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(101, 232, 255, .09), transparent);
      transform: translateX(-110%);
      animation: scan 1.1s ease-out .15s 1;
    }

    .comment.leaving {
      animation: comment-out .28s ease-in forwards;
    }

    @keyframes comment-in {
      from { opacity: 0; transform: translateX(34px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes comment-out {
      to { opacity: 0; transform: translateX(22px); }
    }

    @keyframes scan {
      to { transform: translateX(110%); }
    }

    .comment-meta {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 6px;
    }

    .division {
      flex: 0 0 auto;
      min-width: 27px;
      padding: 3px 5px;
      border: 1px solid color-mix(in srgb, var(--comment-accent) 46%, transparent);
      color: var(--comment-accent);
      font: 900 8px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      text-align: center;
    }

    .name {
      min-width: 0;
      overflow: hidden;
      color: var(--cyan-bright);
      font-size: 12px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .time {
      margin-left: auto;
      color: #668899;
      font: 700 8px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: .06em;
    }

    .message {
      margin: 0;
      color: #eafaff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.55;
      overflow-wrap: anywhere;
      text-shadow: 0 2px 10px rgba(0, 0, 0, .55);
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 7px 10px;
      border-top: 1px solid rgba(101, 232, 255, .20);
      background: linear-gradient(90deg, rgba(5, 21, 31, .84), transparent);
      color: var(--muted);
      font: 700 8px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: .13em;
    }

    .footer b { color: var(--cyan); }

    .empty {
      align-self: end;
      margin-bottom: 10px;
      padding: 10px 12px;
      border-right: 2px solid rgba(101, 232, 255, .35);
      color: rgba(142, 177, 193, .58);
      font: 700 8px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: .12em;
      text-align: right;
    }

    body.left { justify-content: flex-start; }
    body.left .comment { animation-name: comment-in-left; }

    @keyframes comment-in-left {
      from { opacity: 0; transform: translateX(-34px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 520px) {
      body { padding: 14px; }
      .overlay { width: 100%; }
      .header { grid-template-columns: 66px 1fr; }
      .signal { display: none; }
      h1 { font-size: 17px; }
      .message { font-size: 13px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cube { animation-duration: 20s; }
      .signal i,
      .comment::before { animation: none; }
      .comment { animation-duration: .01ms; }
    }
  </style>
</head>
<body>
  <main class="overlay" aria-label="配信コメント">
    <header class="header">
      <div class="cube-stage" aria-hidden="true">
        <div class="cube">
          <i class="cube-face front"></i>
          <i class="cube-face back"></i>
          <i class="cube-face right"></i>
          <i class="cube-face left"></i>
          <i class="cube-face top"></i>
          <i class="cube-face bottom"></i>
        </div>
      </div>
      <div class="heading-copy">
        <p class="eyebrow">BORDER NETWORK // LIVE</p>
        <h1 id="overlayTitle">TRION LINK</h1>
        <small>COMMENT TELEMETRY / CHANNEL 03</small>
      </div>
      <div class="signal"><i></i>LINKED</div>
    </header>

    <section id="commentFeed" class="feed" aria-live="polite">
      <div id="emptyState" class="empty">AWAITING COMMENT SIGNAL...</div>
    </section>

    <footer class="footer">
      <span><b>TRION</b> COMMENT SYSTEM</span>
      <span id="commentCount">00 SIGNALS</span>
    </footer>
  </main>

  <script src="http://localhost:11180/templates/preset/__origin/js/onesdk.js"></script>
  <script>
    (() => {
      "use strict";

      const params = new URLSearchParams(location.search);
      const feed = document.getElementById("commentFeed");
      const emptyState = document.getElementById("emptyState");
      const count = document.getElementById("commentCount");
      const title = document.getElementById("overlayTitle");
      const maxComments = clamp(Number(params.get("max")) || 6, 1, 10);
      const ttlSeconds = clamp(Number(params.get("ttl")) || 0, 0, 600);
      const palette = ["#65e8ff", "#63e6a2", "#ffcf67", "#ff7f92", "#8fa8ff"];
      let signalCount = 0;

      if (params.get("side") === "left") document.body.classList.add("left");
      if (params.get("title")) title.textContent = params.get("title").slice(0, 28);

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function normalizeAccent(value, fallbackIndex) {
        return /^#[0-9a-f]{6}$/i.test(value || "") ? value : palette[fallbackIndex % palette.length];
      }

      function initials(name) {
        const text = String(name || "GUEST").trim();
        return text.replace(/\s+/g, "").slice(0, 2).toUpperCase() || "G";
      }

      function removeComment(node) {
        if (!node || node.classList.contains("leaving")) return;
        node.classList.add("leaving");
        setTimeout(() => {
          node.remove();
          if (!feed.querySelector(".comment")) emptyState.hidden = false;
        }, 300);
      }

      function addComment(name, message, accent) {
        const safeName = String(name || "GUEST").trim().slice(0, 32) || "GUEST";
        const safeMessage = String(message || "").trim().slice(0, 240);
        if (!safeMessage) return;

        signalCount += 1;
        emptyState.hidden = true;

        const article = document.createElement("article");
        article.className = "comment";
        article.style.setProperty("--comment-accent", normalizeAccent(accent, signalCount - 1));

        const meta = document.createElement("div");
        meta.className = "comment-meta";

        const division = document.createElement("span");
        division.className = "division";
        division.textContent = initials(safeName);

        const author = document.createElement("span");
        author.className = "name";
        author.textContent = safeName;

        const time = document.createElement("time");
        time.className = "time";
        time.textContent = new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });

        const body = document.createElement("p");
        body.className = "message";
        body.textContent = safeMessage;

        meta.append(division, author, time);
        article.append(meta, body);
        feed.append(article);

        const comments = [...feed.querySelectorAll(".comment")];
        while (comments.length > maxComments) removeComment(comments.shift());

        count.textContent = `${String(signalCount).padStart(2, "0")} SIGNALS`;
        if (ttlSeconds > 0) setTimeout(() => removeComment(article), ttlSeconds * 1000);
      }

      function acceptPayload(payload) {
        if (!payload || typeof payload !== "object") return;
        if (payload.type && !["trion-comment", "comment", "message"].includes(payload.type)) return;
        addComment(
          payload.name || payload.displayName || payload.user || payload.username,
          payload.message || payload.text || payload.comment,
          payload.accent || payload.color
        );
      }

      window.addTrionComment = addComment;

      window.addEventListener("message", event => acceptPayload(event.data));

      window.addEventListener("onEventReceived", event => {
        const detail = event.detail || {};
        if (detail.listener !== "message") return;
        const data = detail.event?.data || detail.event || {};
        acceptPayload({
          type: "message",
          displayName: data.displayName || data.nick || data.username,
          text: data.text || data.message,
          color: data.displayColor
        });
      });

      if (window.OneSDK) {
        OneSDK.setup({
          mode: "diff",
          intervalTime: 1000,
          commentLimit: 30,
          permissions: ["comments"]
        });

        OneSDK.subscribe({
          action: "comments",
          callback: comments => {
            comments.forEach(item => {
              const data = item?.data || {};
              addComment(
                data.displayName || data.name || data.screenName || "GUEST",
                data.comment || data.speechText || "",
                null
              );
            });
          }
        });

        OneSDK.connect().catch(() => {});
      }

      if (params.get("demo") === "1") {
        const demo = [
          ["玉狛支部", "トリオン反応、安定しています！", "#65e8ff"],
          ["A級観測員", "右側から接近中。レーダー注意！", "#ffcf67"],
          ["迅 悠一", "その動き、悪くないね。", "#63e6a2"],
          ["BORDER_03", "ナイスベイルアウト！ 次いこう！", "#8fa8ff"]
        ];
        demo.forEach((item, index) => setTimeout(() => addComment(...item), 600 + index * 1050));
      }

      document.addEventListener("keydown", event => {
        if (event.key.toLowerCase() === "d") {
          addComment("DEMO AGENT", "テストコメントを受信しました。", "#65e8ff");
        }
      });
    })();
  </script>
</body>
</html>
